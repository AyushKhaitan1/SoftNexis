<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Lite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/utilities.css">
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-top flex-between">
                <div>
                    <h1>TaskFlow <span>Lite</span></h1>
                    <p class="subtitle">Client-side task management</p>
                </div>
                <button id="theme-toggle" class="btn-icon" aria-label="Toggle Dark Mode">🌙</button>
            </div>
        </header>

        <main>
            <form id="task-form" class="task-form">
                <input type="text" id="task-input" placeholder="What needs to be done?" autocomplete="off">
                <button type="submit" class="btn-primary">Add Task</button>
            </form>
            <div id="error-msg" class="error-msg hidden">Please enter a valid task (1-100 characters).</div>

            <div class="controls flex-between mt-2">
                <span id="task-count" class="task-count">0 tasks</span>
                <div class="filters">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="active">Active</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>
            </div>

            <ul id="task-list" class="task-list mt-2">
                </ul>
        </main>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
